name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # sigstore OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Identity-leak guard (history-wide)
        env:
          FRAG_A: ${{ secrets.LEAK_FRAG_A }}
          FRAG_B: ${{ secrets.LEAK_FRAG_B }}
          FRAG_C: ${{ secrets.LEAK_FRAG_C }}
          FRAG_D: ${{ secrets.LEAK_FRAG_D }}
          FRAG_E: ${{ secrets.LEAK_FRAG_E }}
          FRAG_F: ${{ secrets.LEAK_FRAG_F }}
          FRAG_G: ${{ secrets.LEAK_FRAG_G }}
        run: |
          set -euo pipefail
          : "${FRAG_A:?LEAK_FRAG_A not configured in repo secrets}"
          : "${FRAG_B:?LEAK_FRAG_B not configured in repo secrets}"
          : "${FRAG_C:?LEAK_FRAG_C not configured in repo secrets}"
          : "${FRAG_D:?LEAK_FRAG_D not configured in repo secrets}"
          : "${FRAG_E:?LEAK_FRAG_E not configured in repo secrets}"
          : "${FRAG_F:?LEAK_FRAG_F not configured in repo secrets}"
          : "${FRAG_G:?LEAK_FRAG_G not configured in repo secrets}"
          PATTERN="${FRAG_A}|${FRAG_B}|${FRAG_C}|${FRAG_D}|${FRAG_E}|${FRAG_F}|${FRAG_G}|/home/${FRAG_A}"
          FAIL=0
          REFS=$(git for-each-ref --format='%(refname)' refs/tags refs/heads refs/remotes)
          REFS="HEAD $REFS"
          for ref in $REFS; do
            if git grep -n -E "$PATTERN" "$ref" -- \
                ':!*.lock' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.mp4' ':!*.gif' ':!*.npy' ':!*.pdf' \
                ':!.github/workflows/release.yml' \
                > /tmp/leaks.txt 2>/dev/null; then
              echo "::error::Identity-leak at ref $ref:"
              cat /tmp/leaks.txt
              FAIL=1
            fi
          done
          exit $FAIL
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Sign dist with sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc  # v3.0.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Move sigstore bundles aside (avoid twine upload error)
        run: |
          mkdir -p signatures
          mv dist/*.sigstore signatures/ 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: signatures/

  publish:
    name: Publish to PyPI
    needs: build
    # Gated: enable by setting repository variable PYPI_ENABLED=true
    # AND registering PyPI Trusted Publisher (pypi.org → Manage → Publishing).
    if: vars.PYPI_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: GitHub Release
    needs: build
    # Always publishes the GitHub Release (independent of PyPI).
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signatures
          path: signatures/
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" dist/* signatures/* --generate-notes
